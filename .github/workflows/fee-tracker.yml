name: Fee Tracker

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update fee stats
        env:
          WATCHED_WALLET: ${{ vars.WATCHED_WALLET }}
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
        run: node scripts/update-fee-stats.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fee-stats.json
          git diff --staged --quiet || git commit -m "Update fee stats"
          git push
